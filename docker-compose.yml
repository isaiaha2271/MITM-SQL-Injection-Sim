version: '3.8'

services:
web: 
  build: ./web
  ports:
    -"5000:5000"
  depends_on:
    - db

db: 
  image: mysql:8
  environment: 
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: testdb
  ports:
    - "3306:3306"



attacker:
  image: mitmproxy/mitmproxy
  command: mitmproxy --mode transparent
  ports:
    - "8080:8080"